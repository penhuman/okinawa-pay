<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frida 的旅行記帳本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                    },
                    colors: {
                        primary: '#FF8A65', // 溫暖的橘色調
                        secondary: '#FFCCBC',
                        background: '#FFF3E0',
                        text: '#4E342E',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FFF3E0;
            color: #4E342E;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 隱藏滾動條但保持可以滾動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col items-center pb-24">

    <header class="w-full max-w-md sticky top-0 z-10 glass-panel border-b border-orange-100 px-4 py-4 mb-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-wallet text-primary text-2xl"></i>
            <h1 class="text-xl font-bold text-text">Frida 的旅行記帳本</h1>
        </div>
        <div id="auth-status" class="text-xs px-2 py-1 bg-orange-100 text-primary rounded-full font-medium">
            <i class="fa-solid fa-circle-notch fa-spin mr-1"></i>連線中...
        </div>
    </header>

    <main class="w-full max-w-md px-4 flex flex-col gap-4">
        <div class="glass-panel rounded-2xl p-6 text-center shadow-sm border border-orange-100">
            <div class="flex items-center justify-center gap-2 mb-1">
                <h2 class="text-sm text-gray-500 font-medium">總花費 (估算台幣)</h2>
                <div class="text-xs bg-orange-50 text-orange-600 px-2 py-0.5 rounded-full border border-orange-100 flex items-center gap-1">
                    匯率: <input type="number" id="exchange-rate" value="0.21" step="0.001" class="w-12 bg-transparent border-b border-orange-300 outline-none text-center">
                </div>
            </div>
            <div class="text-4xl font-bold text-primary" id="total-amount">0</div>
            
            <div class="flex justify-between mt-4 pt-4 border-t border-orange-100 text-sm">
                <div class="text-center w-1/3 border-r border-orange-100">
                    <div class="text-gray-500 mb-1">Frida 代墊</div>
                    <div class="font-bold text-lg text-text" id="frida-paid">0</div>
                </div>
                <div class="text-center w-1/3 border-r border-orange-100">
                    <div class="text-gray-500 mb-1">Ted 代墊</div>
                    <div class="font-bold text-lg text-text" id="ted-paid">0</div>
                </div>
                <div class="text-center w-1/3">
                    <div class="text-gray-500 mb-1">幸萱 代墊</div>
                    <div class="font-bold text-lg text-text" id="xingxuan-paid">0</div>
                </div>
            </div>
            <!-- 結算提示 -->
            <div id="settlement-hint" class="mt-4 text-sm font-medium text-blue-600 bg-blue-50 p-2 rounded-lg hidden">
                <!-- JavaScript 會填入結算資訊 -->
            </div>
        </div>

        <div class="flex overflow-x-auto gap-2 py-2 no-scrollbar" id="category-filters">
            <button class="filter-btn active px-4 py-1.5 rounded-full bg-primary text-white text-sm font-medium whitespace-nowrap transition-colors" data-category="all">全部</button>
            <button class="filter-btn px-4 py-1.5 rounded-full bg-white text-text border border-orange-200 text-sm font-medium whitespace-nowrap transition-colors" data-category="food">🍜 食</button>
            <button class="filter-btn px-4 py-1.5 rounded-full bg-white text-text border border-orange-200 text-sm font-medium whitespace-nowrap transition-colors" data-category="clothing">👗 衣</button>
            <button class="filter-btn px-4 py-1.5 rounded-full bg-white text-text border border-orange-200 text-sm font-medium whitespace-nowrap transition-colors" data-category="housing">🏨 住</button>
            <button class="filter-btn px-4 py-1.5 rounded-full bg-white text-text border border-orange-200 text-sm font-medium whitespace-nowrap transition-colors" data-category="transport">🚆 行</button>
            <button class="filter-btn px-4 py-1.5 rounded-full bg-white text-text border border-orange-200 text-sm font-medium whitespace-nowrap transition-colors" data-category="entertainment">🎟️ 樂</button>
            <button class="filter-btn px-4 py-1.5 rounded-full bg-white text-text border border-orange-200 text-sm font-medium whitespace-nowrap transition-colors" data-category="other">📦 其他</button>
        </div>

        <div class="flex flex-col gap-3 pb-24" id="expense-list">
            <!-- 載入中動畫 -->
            <div id="loading-spinner" class="py-8 flex flex-col items-center justify-center text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-2 text-primary"></i>
                <p>載入記帳資料中...</p>
            </div>
            <!-- 花費項目會由 JavaScript 動態生成到這裡 -->
        </div>
    </main>

    <!-- 改版：更明顯的「記一筆」按鈕，置中且加上文字 -->
    <button id="open-add-modal-btn" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 px-8 py-3 bg-primary text-white rounded-full shadow-xl flex items-center justify-center gap-2 text-lg font-bold hover:bg-orange-500 active:scale-95 transition-transform z-20 border-2 border-white/50">
        <i class="fa-solid fa-plus text-xl"></i> 記一筆花費
    </button>

    <div id="expense-modal" class="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-t-2xl sm:rounded-2xl p-6 transform translate-y-full sm:translate-y-0 transition-transform duration-300 shadow-xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-text" id="modal-title">新增花費</h3>
                <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600 p-2">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div class="overflow-y-auto no-scrollbar pb-4 flex-1">
                <form id="expense-form" class="flex flex-col gap-4">
                    <input type="hidden" id="expense-id">
                    
                    <!-- 金額 -->
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-medium text-gray-700">金額 <span class="text-red-500">*</span></label>
                            <div class="flex bg-gray-100 rounded-lg p-0.5">
                                <label class="cursor-pointer">
                                    <input type="radio" name="currency" value="TWD" class="peer hidden" checked>
                                    <div class="px-3 py-1 text-xs rounded-md peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-primary font-medium transition-all">NT$ 台幣</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="currency" value="JPY" class="peer hidden">
                                    <div class="px-3 py-1 text-xs rounded-md peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-primary font-medium transition-all">¥ 日圓</div>
                                </label>
                            </div>
                        </div>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 font-bold" id="currency-symbol">NT$</span>
                            <input type="number" id="amount-input" required min="0" step="any" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-lg font-bold" placeholder="0">
                        </div>
                    </div>

                    <!-- 品項名稱 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">品項名稱 <span class="text-red-500">*</span></label>
                        <input type="text" id="title-input" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="例如：晚餐拉麵、單軌一日券">
                    </div>

                    <!-- 類別選擇 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">類別 <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="food" class="peer hidden" checked>
                                <div class="text-center py-2 border border-gray-200 rounded-lg peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-colors">🍜 食</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="clothing" class="peer hidden">
                                <div class="text-center py-2 border border-gray-200 rounded-lg peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-colors">👗 衣</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="housing" class="peer hidden">
                                <div class="text-center py-2 border border-gray-200 rounded-lg peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-colors">🏨 住</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="transport" class="peer hidden">
                                <div class="text-center py-2 border border-gray-200 rounded-lg peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-colors">🚆 行</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="entertainment" class="peer hidden">
                                <div class="text-center py-2 border border-gray-200 rounded-lg peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-colors">🎟️ 樂</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="other" class="peer hidden">
                                <div class="text-center py-2 border border-gray-200 rounded-lg peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-colors">📦 其他</div>
                            </label>
                        </div>
                    </div>

                    <!-- 誰代墊 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">誰先代墊？ <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="cursor-pointer">
                                <input type="radio" name="payer" value="Frida" class="peer hidden" checked>
                                <div class="flex flex-col items-center justify-center py-2 border border-gray-200 rounded-lg peer-checked:bg-orange-100 peer-checked:text-orange-800 peer-checked:border-orange-300 font-medium transition-colors text-sm">
                                    <i class="fa-solid fa-user-astronaut mb-1"></i> Frida
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="payer" value="Ted" class="peer hidden">
                                <div class="flex flex-col items-center justify-center py-2 border border-gray-200 rounded-lg peer-checked:bg-blue-100 peer-checked:text-blue-800 peer-checked:border-blue-300 font-medium transition-colors text-sm">
                                    <i class="fa-solid fa-user-tie mb-1"></i> Ted
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="payer" value="Xingxuan" class="peer hidden">
                                <div class="flex flex-col items-center justify-center py-2 border border-gray-200 rounded-lg peer-checked:bg-pink-100 peer-checked:text-pink-800 peer-checked:border-pink-300 font-medium transition-colors text-sm">
                                    <i class="fa-solid fa-star mb-1"></i> 幸萱
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- 備註 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">備註 (選填)</label>
                        <input type="text" id="note-input" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="例如：幫朋友代買...">
                    </div>
                </form>
            </div>

            <!-- Modal 按鈕區 -->
            <div class="mt-4 flex gap-3 pt-4 border-t border-gray-100">
                <button type="button" id="delete-expense-btn" class="hidden px-4 py-3 bg-red-100 text-red-600 rounded-xl font-medium hover:bg-red-200 transition-colors">
                    <i class="fa-solid fa-trash"></i>
                </button>
                <button type="button" id="save-expense-btn" class="flex-1 bg-primary text-white py-3 rounded-xl font-bold hover:bg-orange-500 active:scale-95 transition-all shadow-md">
                    儲存紀錄
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg z-[60] flex items-center gap-2 transition-opacity duration-300 opacity-0 pointer-events-none">
        <i id="toast-icon" class="fa-solid fa-circle-info"></i>
        <span id="toast-message">訊息提示</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 環境變數設定
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'frida-expense-tracker';
        let firebaseConfig = null;
        let app, db, auth;
        let currentUser = null;
        let unsubscribeSnapshot = null;
        let allExpenses = [];
        let currentFilter = 'all';

        // 類別設定對照表
        const CATEGORY_MAP = {
            'food': { icon: '🍜', label: '食', color: 'bg-red-100 text-red-600' },
            'clothing': { icon: '👗', label: '衣', color: 'bg-pink-100 text-pink-600' },
            'housing': { icon: '🏨', label: '住', color: 'bg-indigo-100 text-indigo-600' },
            'transport': { icon: '🚆', label: '行', color: 'bg-blue-100 text-blue-600' },
            'entertainment': { icon: '🎟️', label: '樂', color: 'bg-purple-100 text-purple-600' },
            'other': { icon: '📦', label: '其他', color: 'bg-gray-100 text-gray-600' }
        };

        // DOM 元素選取
        const els = {
            authStatus: document.getElementById('auth-status'),
            totalAmount: document.getElementById('total-amount'),
            fridaPaid: document.getElementById('frida-paid'),
            tedPaid: document.getElementById('ted-paid'),
            xingxuanPaid: document.getElementById('xingxuan-paid'),
            settlementHint: document.getElementById('settlement-hint'),
            expenseList: document.getElementById('expense-list'),
            loadingSpinner: document.getElementById('loading-spinner'),
            
            // Modal 相關
            openAddModalBtn: document.getElementById('open-add-modal-btn'),
            expenseModal: document.getElementById('expense-modal'),
            modalContent: document.querySelector('#expense-modal > div'),
            closeModalBtn: document.getElementById('close-modal-btn'),
            expenseForm: document.getElementById('expense-form'),
            saveExpenseBtn: document.getElementById('save-expense-btn'),
            deleteExpenseBtn: document.getElementById('delete-expense-btn'),
            modalTitle: document.getElementById('modal-title'),
            
            // 表單輸入
            expenseId: document.getElementById('expense-id'),
            amountInput: document.getElementById('amount-input'),
            currencySymbol: document.getElementById('currency-symbol'),
            exchangeRate: document.getElementById('exchange-rate'),
            titleInput: document.getElementById('title-input'),
            noteInput: document.getElementById('note-input'),
            
            // 篩選器
            categoryFilters: document.getElementById('category-filters'),
            
            // Toast
            toast: document.getElementById('toast'),
            toastIcon: document.getElementById('toast-icon'),
            toastMessage: document.getElementById('toast-message')
        };

        
        // 顯示 Toast 訊息
        function showToast(message, type = 'info') {
            els.toastMessage.textContent = message;
            
            if (type === 'success') {
                els.toastIcon.className = 'fa-solid fa-circle-check text-green-400';
            } else if (type === 'error') {
                els.toastIcon.className = 'fa-solid fa-circle-exclamation text-red-400';
            } else {
                els.toastIcon.className = 'fa-solid fa-circle-info text-blue-400';
            }

            els.toast.classList.remove('opacity-0', 'pointer-events-none');
            els.toast.classList.add('opacity-100');
            
            setTimeout(() => {
                els.toast.classList.remove('opacity-100');
                els.toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // 數字格式化 (千分位)
        function formatMoney(amount) {
            return new Intl.NumberFormat('zh-TW').format(amount);
        }

        // 日期格式化
        function formatDate(timestamp) {
            if (!timestamp) return '剛剛';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const isToday = date.getDate() === now.getDate() && date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
            
            if (isToday) {
                return `今天 ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            }
            
            return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        async function initFirebase() {
            try {
                if (typeof __firebase_config !== 'undefined') {
                    firebaseConfig = JSON.parse(__firebase_config);
                } else {
                    throw new Error("找不到 Firebase 設定");
                }

                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                // 登入處理
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                currentUser = auth.currentUser;
                
                els.authStatus.innerHTML = '<i class="fa-solid fa-cloud text-green-500 mr-1"></i>已連線';
                els.authStatus.classList.remove('text-primary', 'bg-orange-100');
                els.authStatus.classList.add('text-green-700', 'bg-green-100');

                // 載入資料
                setupRealtimeListener();

            } catch (error) {
                console.error("Firebase 初始化失敗:", error);
                els.authStatus.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-500 mr-1"></i>連線失敗';
                els.authStatus.classList.remove('text-primary', 'bg-orange-100');
                els.authStatus.classList.add('text-red-700', 'bg-red-100');
                showToast("資料庫連線失敗，請重新整理頁面", "error");
                els.loadingSpinner.innerHTML = '<p class="text-red-500">無法載入資料</p>';
            }
        }

        function setupRealtimeListener() {
            if (!currentUser) return;

            // 注意：為了共享帳本，使用 public data collection
            const expensesRef = collection(db, 'artifacts', appId, 'public', 'data', 'expenses');
            
            // 這裡不使用 orderBy 或 where，因為需要建立索引，我們改在客戶端排序
            const q = query(expensesRef);

            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                allExpenses = [];
                snapshot.forEach((doc) => {
                    allExpenses.push({ id: doc.id, ...doc.data() });
                });

                // 在客戶端進行排序 (依時間遞減)
                allExpenses.sort((a, b) => {
                    const timeA = a.createdAt ? (a.createdAt.toMillis ? a.createdAt.toMillis() : a.createdAt) : 0;
                    const timeB = b.createdAt ? (b.createdAt.toMillis ? b.createdAt.toMillis() : b.createdAt) : 0;
                    return timeB - timeA; // 新的在上面
                });

                els.loadingSpinner.style.display = 'none';
                renderDashboard();
                renderExpenseList();
            }, (error) => {
                console.error("讀取資料失敗:", error);
                showToast("讀取資料失敗", "error");
            });
        }

        // 計算並渲染統計數據
        function renderDashboard() {
            let total = 0;
            let fridaTotal = 0;
            let tedTotal = 0;
            let xingxuanTotal = 0;
            const rate = Number(els.exchangeRate.value) || 0.21;

            allExpenses.forEach(expense => {
                const amt = Number(expense.amount) || 0;
                const cur = expense.currency || 'TWD';
                const amtInTWD = cur === 'JPY' ? amt * rate : amt;

                total += amtInTWD;
                if (expense.payer === 'Frida') {
                    fridaTotal += amtInTWD;
                } else if (expense.payer === 'Husband' || expense.payer === 'Ted') {
                    tedTotal += amtInTWD;
                } else if (expense.payer === 'Xingxuan') {
                    xingxuanTotal += amtInTWD;
                }
            });

            els.totalAmount.textContent = formatMoney(Math.round(total));
            els.fridaPaid.textContent = `$${formatMoney(Math.round(fridaTotal))}`;
            els.tedPaid.textContent = `$${formatMoney(Math.round(tedTotal))}`;
            els.xingxuanPaid.textContent = `$${formatMoney(Math.round(xingxuanTotal))}`;

            // 計算結算金額 (假設花費由 3 人平分)
            const perPerson = total / 3;
            els.settlementHint.classList.remove('hidden');
            
            if (total === 0) {
                 els.settlementHint.classList.add('hidden');
            } else {
                const balances = [
                    { name: 'Frida', balance: fridaTotal - perPerson },
                    { name: 'Ted', balance: tedTotal - perPerson },
                    { name: '幸萱', balance: xingxuanTotal - perPerson }
                ];
                
                let html = `<div class="text-gray-600 mb-2 font-bold border-b border-gray-200 pb-1">平均每人應付: $${formatMoney(Math.round(perPerson))}</div>`;
                
                balances.forEach(b => {
                    const diff = Math.round(b.balance);
                    if (diff > 0) {
                        html += `<div class="mt-1">${b.name} <span class="text-green-600 font-bold">應收回 $${formatMoney(diff)}</span></div>`;
                    } else if (diff < 0) {
                        html += `<div class="mt-1">${b.name} <span class="text-red-500 font-bold">需再拿 $${formatMoney(Math.abs(diff))}</span></div>`;
                    } else {
                        html += `<div class="mt-1">${b.name} <span class="text-gray-500">已結清</span></div>`;
                    }
                });
                
                els.settlementHint.innerHTML = html;
                els.settlementHint.className = "mt-4 text-sm font-medium bg-white p-4 rounded-xl text-left border border-gray-200 shadow-sm";
            }
        }

        // 渲染花費列表
        function renderExpenseList() {
            els.expenseList.innerHTML = '';
            
            const filteredExpenses = currentFilter === 'all' 
                ? allExpenses 
                : allExpenses.filter(e => e.category === currentFilter);

            if (filteredExpenses.length === 0) {
                els.expenseList.innerHTML = `
                    <div class="text-center py-10 text-gray-400">
                        <i class="fa-solid fa-box-open text-4xl mb-3 opacity-50"></i>
                        <p>這個類別還沒有花費紀錄喔！</p>
                    </div>`;
                return;
            }

            filteredExpenses.forEach(expense => {
                const catInfo = CATEGORY_MAP[expense.category] || CATEGORY_MAP['other'];
                
                let payerIcon = '';
                if (expense.payer === 'Frida') {
                    payerIcon = '<span class="text-xs bg-orange-100 text-orange-800 px-2 py-0.5 rounded ml-2 border border-orange-200 whitespace-nowrap"><i class="fa-solid fa-user-astronaut mr-1"></i>Frida</span>';
                } else if (expense.payer === 'Husband' || expense.payer === 'Ted') {
                    payerIcon = '<span class="text-xs bg-blue-100 text-blue-800 px-2 py-0.5 rounded ml-2 border border-blue-200 whitespace-nowrap"><i class="fa-solid fa-user-tie mr-1"></i>Ted</span>';
                } else if (expense.payer === 'Xingxuan') {
                    payerIcon = '<span class="text-xs bg-pink-100 text-pink-800 px-2 py-0.5 rounded ml-2 border border-pink-200 whitespace-nowrap"><i class="fa-solid fa-star mr-1"></i>幸萱</span>';
                }

                const item = document.createElement('div');
                item.className = 'glass-panel p-4 rounded-2xl flex items-center justify-between cursor-pointer hover:bg-white/90 transition-colors border border-orange-50';
                item.onclick = () => openEditModal(expense);
                
                const cur = expense.currency || 'TWD';
                const displayAmount = cur === 'JPY' ? `¥${formatMoney(expense.amount)}` : `NT$${formatMoney(expense.amount)}`;

                item.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-12 h-12 flex-shrink-0 rounded-full flex items-center justify-center text-xl ${catInfo.color}">
                            ${catInfo.icon}
                        </div>
                        <div class="flex flex-col overflow-hidden">
                            <div class="font-bold text-text truncate flex items-center">
                                ${expense.title} ${payerIcon}
                            </div>
                            <div class="text-xs text-gray-500 mt-1 truncate">
                                ${formatDate(expense.createdAt)}
                                ${expense.note ? `<span class="ml-2 px-1.5 py-0.5 bg-gray-100 rounded text-gray-600 truncate inline-block max-w-[100px] align-bottom">${expense.note}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="font-bold text-lg text-primary flex-shrink-0 ml-2">
                        ${displayAmount}
                    </div>
                `;
                els.expenseList.appendChild(item);
            });
        }

        
        function openModal() {
            els.expenseModal.classList.remove('hidden');
            // 強制重繪
            void els.expenseModal.offsetWidth;
            
            els.expenseModal.classList.remove('opacity-0');
            if (window.innerWidth < 640) { // Mobile
                els.modalContent.classList.remove('translate-y-full');
            } else { // Desktop
                els.modalContent.classList.remove('scale-95', 'opacity-0');
            }
        }

        function closeModal() {
            els.expenseModal.classList.add('opacity-0');
            if (window.innerWidth < 640) {
                els.modalContent.classList.add('translate-y-full');
            } else {
                // Desktop 隱藏動畫 (簡單處理)
            }
            
            setTimeout(() => {
                els.expenseModal.classList.add('hidden');
                els.expenseForm.reset();
                els.expenseId.value = '';
                els.deleteExpenseBtn.classList.add('hidden');
            }, 300); // 對應 transition-duration
        }

        function openAddModal() {
            els.modalTitle.textContent = '新增花費';
            els.expenseId.value = '';
            els.expenseForm.reset();
            
            // 預設選中 Frida 和 食，以及台幣
            document.querySelector('input[name="payer"][value="Frida"]').checked = true;
            document.querySelector('input[name="category"][value="food"]').checked = true;
            document.querySelector('input[name="currency"][value="TWD"]').checked = true;
            els.currencySymbol.textContent = 'NT$';
            
            els.deleteExpenseBtn.classList.add('hidden');
            openModal();
            
            // 延遲 focus，避免手機鍵盤彈出破壞動畫
            setTimeout(() => els.amountInput.focus(), 300);
        }

        function openEditModal(expense) {
            els.modalTitle.textContent = '編輯花費';
            els.expenseId.value = expense.id;
            els.amountInput.value = expense.amount;
            els.titleInput.value = expense.title;
            els.noteInput.value = expense.note || '';
            
            // 設定幣值
            const currency = expense.currency || 'TWD';
            const curRadio = document.querySelector(`input[name="currency"][value="${currency}"]`);
            if (curRadio) curRadio.checked = true;
            els.currencySymbol.textContent = currency === 'JPY' ? '¥' : 'NT$';

            // 設定 Radio buttons
            const catRadio = document.querySelector(`input[name="category"][value="${expense.category}"]`);
            if (catRadio) catRadio.checked = true;
            
            // 相容舊資料中老公的選項
            let targetPayer = expense.payer;
            if (targetPayer === 'Husband') targetPayer = 'Ted';
            const payerRadio = document.querySelector(`input[name="payer"][value="${targetPayer}"]`);
            if (payerRadio) payerRadio.checked = true;
            
            els.deleteExpenseBtn.classList.remove('hidden');
            openModal();
        }

        
        async function saveExpense() {
            if (!currentUser) return;
            
            const amount = Number(els.amountInput.value);
            const title = els.titleInput.value.trim();
            const note = els.noteInput.value.trim();
            const category = document.querySelector('input[name="category"]:checked').value;
            const payer = document.querySelector('input[name="payer"]:checked').value;
            const currency = document.querySelector('input[name="currency"]:checked').value;
            const id = els.expenseId.value;

            if (!amount || amount <= 0) {
                showToast("請輸入有效金額", "error");
                els.amountInput.focus();
                return;
            }
            if (!title) {
                showToast("請輸入名稱", "error");
                els.titleInput.focus();
                return;
            }

            const expenseData = {
                amount,
                currency,
                title,
                category,
                payer,
                note,
                updatedAt: serverTimestamp()
            };

            const origText = els.saveExpenseBtn.innerHTML;
            els.saveExpenseBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';
            els.saveExpenseBtn.disabled = true;

            try {
                const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'expenses');
                
                if (id) {
                    // 更新
                    const docRef = doc(collectionRef, id);
                    await updateDoc(docRef, expenseData);
                    showToast("更新成功", "success");
                } else {
                    // 新增
                    expenseData.createdAt = serverTimestamp();
                    await addDoc(collectionRef, expenseData);
                    showToast("新增成功", "success");
                }
                closeModal();
            } catch (error) {
                console.error("儲存失敗:", error);
                showToast("儲存失敗，請重試", "error");
            } finally {
                els.saveExpenseBtn.innerHTML = origText;
                els.saveExpenseBtn.disabled = false;
            }
        }

        async function deleteExpense() {
            if (!currentUser) return;
            
            const id = els.expenseId.value;
            if (!id) return;

            // 自製確認對話框，避免使用原生 confirm
            if (window.confirmDelete) {
                // 已確認，執行刪除
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'expenses', id);
                    await deleteDoc(docRef);
                    showToast("已刪除紀錄", "success");
                    closeModal();
                } catch (error) {
                    console.error("刪除失敗:", error);
                    showToast("刪除失敗", "error");
                } finally {
                    window.confirmDelete = false;
                    els.deleteExpenseBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
                }
            } else {
                // 第一次點擊，顯示確認狀態
                window.confirmDelete = true;
                els.deleteExpenseBtn.innerHTML = '確定刪除?';
                els.deleteExpenseBtn.classList.remove('bg-red-100', 'text-red-600');
                els.deleteExpenseBtn.classList.add('bg-red-500', 'text-white');
                
                // 3秒後取消確認狀態
                setTimeout(() => {
                    if (window.confirmDelete) {
                        window.confirmDelete = false;
                        els.deleteExpenseBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
                        els.deleteExpenseBtn.classList.add('bg-red-100', 'text-red-600');
                        els.deleteExpenseBtn.classList.remove('bg-red-500', 'text-white');
                    }
                }, 3000);
            }
        }

        
        // 綁定按鈕事件
        els.openAddModalBtn.addEventListener('click', openAddModal);
        els.closeModalBtn.addEventListener('click', closeModal);
        els.saveExpenseBtn.addEventListener('click', saveExpense);
        els.deleteExpenseBtn.addEventListener('click', deleteExpense);

        // 匯率變更事件
        els.exchangeRate.addEventListener('input', renderDashboard);

        // 幣值切換事件
        document.querySelectorAll('input[name="currency"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                els.currencySymbol.textContent = e.target.value === 'JPY' ? '¥' : 'NT$';
            });
        });

        // 點擊 Modal 背景關閉
        els.expenseModal.addEventListener('click', (e) => {
            if (e.target === els.expenseModal) {
                closeModal();
            }
        });

        // 篩選器點擊事件
        els.categoryFilters.addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;

            // 更新按鈕樣式
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-primary', 'text-white');
                b.classList.add('bg-white', 'text-text', 'border', 'border-orange-200');
            });
            
            btn.classList.remove('bg-white', 'text-text', 'border', 'border-orange-200');
            btn.classList.add('bg-primary', 'text-white');

            currentFilter = btn.dataset.category;
            renderExpenseList();
            
            // 讓點擊的按鈕滾動到畫面可見範圍
            btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });

        // 啟動 App
        window.addEventListener('DOMContentLoaded', initFirebase);

    </script>
</body>
</html>
